<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#12121A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Hairline grid -->
  <g stroke="#1E1E2E" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
  </g>

  <!-- TD logo -->
  <g transform="translate(80, 110)">
    <rect width="60" height="60" rx="12" fill="#0A0A0F" stroke="#6C63FF" stroke-width="1.5"/>
    <text
      x="30"
      y="40"
      text-anchor="middle"
      font-family="'IBM Plex Mono', monospace"
      font-size="22"
      font-weight="500"
      fill="#6C63FF"
    >TD</text>
  </g>
  <text
    x="160"
    y="155"
    font-family="'IBM Plex Mono', monospace"
    font-size="14"
    fill="#6C63FF"
    letter-spacing="2.5"
  >TYLER DOBSON</text>

  <!-- Headline -->
  <text
    x="80"
    y="280"
    font-family="'Inter', sans-serif"
    font-size="60"
    font-weight="300"
    fill="#E2E2E8"
  >I build AI-powered systems</text>
  <text
    x="80"
    y="350"
    font-family="'Inter', sans-serif"
    font-size="60"
    font-weight="300"
    fill="#E2E2E8"
  >that turn manual workflows</text>
  <text
    x="80"
    y="420"
    font-family="'Inter', sans-serif"
    font-size="60"
    font-weight="300"
    fill="#E2E2E8"
  >into automated infrastructure.</text>

  <!-- Footer -->
  <text
    x="80"
    y="595"
    font-family="'IBM Plex Mono', monospace"
    font-size="14"
    fill="#9999A8"
    letter-spacing="1.5"
